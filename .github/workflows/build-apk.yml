name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      MAPBOX_ACCESS_TOKEN: ${{ secrets.MAPBOX_ACCESS_TOKEN }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.22.0'

      - name: Generate Android platform if missing
        run: |
          if [ ! -d "android" ]; then
            flutter create --platforms=android --org com.realitymerge .
          fi

      - name: Add permissions to AndroidManifest.xml
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            sed -i 's|<application|<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />\n    <uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />\n    <application|' "$MANIFEST"
          fi

      - name: Write .env file
        run: |
          printf 'SUPABASE_URL=%s\nSUPABASE_ANON_KEY=%s\nMAPBOX_ACCESS_TOKEN=%s\nDEFAULT_UNLOCK_RADIUS_M=50\n' \
            "$SUPABASE_URL" "$SUPABASE_ANON_KEY" "$MAPBOX_ACCESS_TOKEN" > .env

      - name: Write Mapbox token to local.properties
        run: |
          echo "MAPBOX_DOWNLOADS_TOKEN=$MAPBOX_ACCESS_TOKEN" >> android/local.properties

      - name: Clear pub cache
        run: flutter pub cache clean --force

      - name: Get Flutter packages
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: reality-merge-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
