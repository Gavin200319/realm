name: reality_merge
description: "Reality Merge v3 — AR drops, location-unlocked social."
publish_to: 'none'
version: 0.3.0

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.5.0
  geolocator: ^12.0.0
  geolocator_android: ^4.6.1
  geolocator_apple: ^2.3.7
  image_picker: ^1.1.2
  flutter_dotenv: ^5.1.0
  intl: ^0.19.0
  http: ^1.2.0
  file_picker: ^10.3.9
  shared_preferences: ^2.3.2
  video_player: ^2.9.1
  vector_math: ^2.1.4
  permission_handler: ^11.3.1
  sensors_plus: ^5.0.1
  url_launcher: ^6.3.1
  image: ^4.2.0
  video_compress: ^3.1.3
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  connectivity_plus: ^6.0.5
  flutter_secure_storage: ^9.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/branding/realm_logo.png
    - assets/branding/realm_icon_mark.png

# Launcher icons were generated directly (mipmap-mdpi through -xxxhdpi)
# from assets/branding/realm_icon_mark.png, since it's just the pin
# mark cropped square — the wordmark in realm_logo.png would be
# illegible at launcher-icon sizes. This config is kept so the icons
# can be regenerated the same way later (`dart run flutter_launcher_icons`)
# if the mark changes.
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/branding/realm_icon_mark.png"
  adaptive_icon_background: "#0A0A0F"
  adaptive_icon_foreground: "assets/branding/realm_icon_mark.png"
  min_sdk_android: 21
