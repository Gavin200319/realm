name: reality_merge
description: "Reality Merge v3 — AR drops, location-unlocked social."
publish_to: 'none'
version: 0.3.0

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.5.0
  geolocator: ^12.0.0
  geolocator_android: ^4.6.1
  geolocator_apple: ^2.3.7
  image_picker: ^1.1.2
  flutter_dotenv: ^5.1.0
  intl: ^0.19.0
  http: ^1.2.0
  file_picker: ^10.3.9
  shared_preferences: ^2.3.2
  video_player: ^2.9.1
  vector_math: ^2.1.4
  permission_handler: ^11.3.1
  sensors_plus: ^5.0.1
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
